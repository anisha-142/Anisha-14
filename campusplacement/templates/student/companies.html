<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Companies | JSS Placement Portal</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <style>
        :root {
            --primary: #4f46e5;
            --glass: rgba(255, 255, 255, 0.95);
            --accent: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(30, 27, 75, 0.8)),
                url('http://www.jssinstitutionsdharwad.com/images/s1.jpg') no-repeat center center/cover;
            min-height: 100vh;
            color: white;
            padding: 60px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease;
        }

        .header-logo {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 50%;
            padding: 10px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        .header-logo i {
            font-size: 3rem;
            color: var(--primary);
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 15px;
        }

        .stats-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 20px;
            border-radius: 50px;
            margin-top: 15px;
            font-size: 0.9rem;
        }

        .search-bar {
            max-width: 500px;
            margin: 30px auto 0;
            position: relative;
        }

        .search-bar input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }

        .search-bar i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }

        .company-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            max-width: 1400px;
            margin: 40px auto;
        }

        .company-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 30px;
            color: #1f2937;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            animation: fadeInUp 0.6s ease;
        }

        .company-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 40px 80px -15px rgba(0, 0, 0, 0.6);
            background: white;
        }

        .company-icon {
            width: 70px;
            height: 70px;
            background: #eef2ff;
            color: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin-bottom: 20px;
            transition: 0.5s;
        }

        .company-card:hover .company-icon {
            transform: rotateY(360deg);
            background: var(--primary);
            color: white;
        }

        .company-card h3 {
            font-size: 1.5rem;
            font-weight: 800;
            color: #111827;
            margin-bottom: 8px;
        }

        .company-card p {
            color: #6b7280;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .job-badge {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 10px;
        }

        .back-nav {
            display: flex;
            justify-content: center;
            margin-top: 40px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 32px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 16px;
            font-weight: 700;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #4338ca;
            transform: scale(1.05);
        }

        /* MODAL STYLING */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s;
        }

        .modal-card {
            background: white;
            padding: 40px;
            border-radius: 32px;
            width: 95%;
            max-width: 800px;
            max-height: 85vh;
            overflow-y: auto;
            color: #1f2937;
            position: relative;
            animation: slideInUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-section {
            margin-top: 25px;
        }

        .modal-section h4 {
            color: #111827;
            margin-bottom: 12px;
            font-weight: 800;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 8px;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #9ca3af;
            transition: 0.3s;
            z-index: 10;
        }

        .close-modal:hover {
            color: #111827;
            transform: rotate(90deg);
        }

        .job-list {
            list-style: none;
            margin-top: 20px;
        }

        .job-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px;
            background: #f8fafc;
            border-radius: 16px;
            margin-bottom: 12px;
            transition: 0.3s;
            border: 1px solid #e2e8f0;
        }

        .job-item:hover {
            transform: translateX(5px);
            background: #f1f5f9;
            border-color: var(--primary);
        }

        .job-info h4 {
            font-weight: 700;
            color: #111827;
            margin-bottom: 5px;
        }

        .job-info span {
            font-size: 0.85rem;
            color: #6b7280;
            font-weight: 500;
        }

        .job-details {
            font-size: 0.8rem;
            color: #8b5cf6;
            margin-top: 5px;
        }

        .apply-btn {
            background: var(--primary);
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            border: none;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .apply-btn:hover:not(:disabled) {
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
            transform: scale(1.05);
        }

        .apply-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        .applied-badge {
            background: var(--success);
            color: white;
            padding: 6px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .toast-notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: white;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            z-index: 1100;
            animation: slideInRight 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .toast-success {
            border-left: 4px solid var(--success);
        }

        .toast-error {
            border-left: 4px solid var(--danger);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideInUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading {
            opacity: 0.7;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .company-grid {
                grid-template-columns: 1fr;
            }
            
            .modal-card {
                padding: 25px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header">
            <div class="header-logo">
                <i class="fas fa-building"></i>
            </div>
            <h1>Partner Companies</h1>
            <p>Explore opportunities from our trusted recruiting partners</p>
            
            <div class="stats-badge">
                <i class="fas fa-briefcase"></i> {{ total_companies }} Active Recruiters
            </div>
            
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <form method="GET" action="">
                    <input type="text" name="q" placeholder="Search companies..." value="{{ search_query }}" onchange="this.form.submit()">
                </form>
            </div>
        </div>

        <div class="company-grid" id="companyGrid">
            <!-- Companies will be populated by JavaScript -->
        </div>

        <div class="back-nav">
            <a href="{% url 'home' %}" class="back-btn">
                <i class="fas fa-arrow-left"></i> Return to Dashboard
            </a>
        </div>
    </div>

    <!-- JOBS MODAL -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal-card" id="modalCard" onclick="event.stopPropagation()">
            <div class="close-modal" onclick="closeModal()">
                <i class="fas fa-times"></i>
            </div>

            <div id="modalContent">
                <h2 id="modalTitle" style="color: var(--primary); font-size: 2rem; margin-bottom: 10px;"></h2>
                <p id="modalWebsite" style="color: #6b7280; margin-bottom: 20px;"></p>
                
                <div class="modal-section">
                    <h4>About Company</h4>
                    <p id="modalDescription" style="color: #4b5563; line-height: 1.6;"></p>
                </div>

                <div class="modal-section">
                    <h4>Contact Information</h4>
                    <p id="modalContact" style="color: #6b7280;"></p>
                </div>

                <div class="modal-section">
                    <h4>Current Openings</h4>
                    <ul class="job-list" id="jobList"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Parse company data from Django
        let companiesData = [];
        try {
            companiesData = {{ companies|safe }};
            console.log('Companies loaded:', companiesData.length);
        } catch(e) {
            console.error('Error parsing company data:', e);
            companiesData = [];
        }
        
        // Render company cards
        function renderCompanies() {
            const grid = document.getElementById('companyGrid');
            if (!grid) return;
            
            if (companiesData.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 60px; background: rgba(255,255,255,0.1); border-radius: 24px;">
                        <i class="fas fa-building" style="font-size: 3rem; margin-bottom: 20px;"></i>
                        <h3>No Companies Available</h3>
                        <p>Check back later for new opportunities!</p>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = companiesData.map(company => `
                <div class="company-card animate__animated animate__fadeInUp" onclick="openCompanyModal(${company.id})" data-company-id="${company.id}">
                    <div class="company-icon">
                        <i class="fas fa-building"></i>
                    </div>
                    <h3>${escapeHtml(company.name)}</h3>
                    <p>${escapeHtml(company.description.substring(0, 100))}...</p>
                    <div class="job-badge">
                        <i class="fas fa-briefcase"></i> ${company.total_jobs} Open Positions
                    </div>
                </div>
            `).join('');
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast-notification toast-${type}`;
            toast.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}" style="color: ${type === 'success' ? '#10b981' : '#ef4444'}; font-size: 1.2rem;"></i>
                <span>${escapeHtml(message)}</span>
            `;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        function openCompanyModal(companyId) {
            const company = companiesData.find(c => c.id == companyId);
            if (!company) {
                console.error('Company not found:', companyId);
                showToast('Company data not found', 'error');
                return;
            }
            
            const modal = document.getElementById('modalOverlay');
            const title = document.getElementById('modalTitle');
            const website = document.getElementById('modalWebsite');
            const description = document.getElementById('modalDescription');
            const contact = document.getElementById('modalContact');
            const jobList = document.getElementById('jobList');
            
            title.textContent = company.name;
            website.innerHTML = company.website ? `<i class="fas fa-globe"></i> <a href="${company.website}" target="_blank" style="color: var(--primary);">${company.website}</a>` : '';
            description.textContent = company.description;
            contact.innerHTML = `
                <i class="fas fa-user"></i> ${escapeHtml(company.hr_name)}<br>
                <i class="fas fa-envelope"></i> ${escapeHtml(company.hr_email)}<br>
                <i class="fas fa-phone"></i> ${escapeHtml(company.hr_phone)}
            `;
            
            jobList.innerHTML = '';
            if (company.jobs.length === 0) {
                jobList.innerHTML = '<li style="text-align: center; padding: 20px; color: #6b7280;">No active job openings at the moment. Check back soon!</li>';
            } else {
                company.jobs.forEach(job => {
                    const li = document.createElement('li');
                    li.className = 'job-item';
                    
                    const eligibilityText = [];
                    if (job.min_cgpa > 0) eligibilityText.push(`Min CGPA: ${job.min_cgpa}`);
                    if (job.eligible_departments && job.eligible_departments.length > 0) eligibilityText.push(`Eligible: ${job.eligible_departments.join(', ')}`);
                    
                    li.innerHTML = `
                        <div class="job-info">
                            <h4>${escapeHtml(job.title)}</h4>
                            <span>${escapeHtml(job.job_type)} • Package: ${escapeHtml(job.package)} • Location: ${escapeHtml(job.location)}</span>
                            <div class="job-details">
                                <i class="fas fa-calendar"></i> Deadline: ${job.deadline}
                                ${eligibilityText.length ? ` • ${eligibilityText.join(' • ')}` : ''}
                            </div>
                        </div>
                        ${job.is_applied ? 
                            '<span class="applied-badge"><i class="fas fa-check"></i> Applied</span>' : 
                            `<button class="apply-btn" onclick="applyForJob(event, ${job.id}, '${escapeHtml(job.title)}')">Apply Now</button>`
                        }
                    `;
                    jobList.appendChild(li);
                });
            }
            
            modal.style.display = 'flex';
        }
        
        function closeModal(event) {
            if (!event || event.target === document.getElementById('modalOverlay')) {
                document.getElementById('modalOverlay').style.display = 'none';
            }
        }
        
        async function applyForJob(event, jobId, jobTitle) {
            event.stopPropagation();
            
            const button = event.target;
            const originalText = button.innerHTML;
            button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Applying...';
            button.disabled = true;
            
            try {
                const response = await fetch('/apply-job-ajax/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken'),
                        'X-Requested-With': 'XMLHttpRequest'
                    },
                    body: JSON.stringify({ job_id: jobId })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showToast(data.message, 'success');
                    button.parentElement.innerHTML = '<span class="applied-badge"><i class="fas fa-check"></i> Applied</span>';
                    
                    // Update the job status in companiesData
                    for (let company of companiesData) {
                        const job = company.jobs.find(j => j.id === jobId);
                        if (job) {
                            job.is_applied = true;
                            break;
                        }
                    }
                } else {
                    showToast(data.message, 'error');
                    button.innerHTML = originalText;
                    button.disabled = false;
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Failed to apply. Please try again.', 'error');
                button.innerHTML = originalText;
                button.disabled = false;
            }
        }
        
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
        
        // Close modal on escape key
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeModal();
            }
        });
        
        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            renderCompanies();
        });
    </script>

</body>

</html>
