{% extends 'admin/base.html' %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
    :root {
        --primary: #4F46E5;
        --bg: #f8fafc;
    }

    .page-wrapper {
        font-family: 'Outfit', sans-serif;
        background: var(--bg);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    .form-card {
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        width: 100%;
        max-width: 500px;
    }

    h1 {
        text-align: center;
        color: #1e1b4b;
        margin-bottom: 30px;
        font-size: 1.8rem;
    }

    .form-group {
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #4b5563;
    }

    input, textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        font-size: 1rem;
        font-family: 'Outfit', sans-serif;
        transition: 0.3s;
    }

    input:focus, textarea:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(79,70,229,0.1);
    }

    textarea {
        resize: vertical;
        min-height: 90px;
    }

    .btn {
        width: 100%;
        padding: 14px;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 10px;
        font-weight: 700;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 10px;
        font-size: 1.05rem;
    }

    .btn:hover {
        background: #4338ca;
        transform: translateY(-2px);
    }

    .messages {
        text-align: center;
        margin-bottom: 20px;
    }

    .success { color: #10b981; }
    .error { color: #ef4444; }

    .back-link {
        display: block;
        text-align: center;
        margin-top: 20px;
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
    }

    .back-link:hover {
        text-decoration: underline;
    }
</style>

<div class="page-wrapper">
    <div class="form-card">
        <h1>✏️ Edit College</h1>

        {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <p class="{{ message.tags }}">{{ message }}</p>
            {% endfor %}
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label>College Name</label>
                <input type="text" name="name" value="{{ college.name }}" required>
            </div>

            <div class="form-group">
                <label>College Code</label>
                <input type="text" name="code" value="{{ college.code }}" required>
            </div>

            <div class="form-group">
                <label>Address</label>
                <textarea name="address" required>{{ college.address }}</textarea>
            </div>

            <div class="form-group">
                <label>Email ID</label>
                <input type="email" name="email" value="{{ college.email }}" required>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="number" name="phone" value="{{ college.phone }}" required>
            </div>

            <button type="submit" class="btn">Update College</button>
        </form>

        <a href="/placement_app/colleged/" class="back-link">← Back to College List</a>
    </div>
</div>

{% endblock %}
