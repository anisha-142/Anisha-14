{% extends 'admin/base.html' %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
    :root {
        --primary: #4F46E5;
        --bg: #f8fafc;
    }

    .page-wrapper {
        font-family: 'Outfit', sans-serif;
        background: var(--bg);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    .form-card {
        background: #fff;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        width: 100%;
        max-width: 500px;
    }

    h1 {
        text-align: center;
        color: #1e1b4b;
        margin-bottom: 25px;
        font-size: 1.7rem;
    }

    .form-group {
        margin-bottom: 18px;
    }

    label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
        color: #4b5563;
    }

    select {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #e2e8f0;
        font-size: 0.95rem;
        font-family: 'Outfit', sans-serif;
        transition: 0.3s;
    }

    select:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(79,70,229,0.1);
    }

    .btn {
        width: 100%;
        padding: 14px;
        background: var(--primary);
        color: #fff;
        border: none;
        border-radius: 10px;
        font-weight: 700;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 10px;
    }

    .btn:hover {
        background: #4338ca;
        transform: translateY(-2px);
    }

    .messages {
        text-align: center;
        margin-bottom: 15px;
    }

    .success { color: #10b981; }
    .error { color: #ef4444; }

    .back-link {
        display: block;
        text-align: center;
        margin-top: 20px;
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
    }

    .back-link:hover {
        text-decoration: underline;
    }
</style>

<div class="page-wrapper">
    <div class="form-card">
        <h1>✏️ Edit Job Application</h1>

        {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <p class="{{ message.tags }}">{{ message }}</p>
            {% endfor %}
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label>Student</label>
                <select name="student" required>
                    {% for s in students %}
                        <option value="{{ s.id }}" {% if s.id == application.student.id %}selected{% endif %}>
                            {{ s.user.username }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Job</label>
                <select name="job" required>
                    {% for j in jobs %}
                        <option value="{{ j.id }}" {% if j.id == application.job.id %}selected{% endif %}>
                            {{ j.title }} - {{ j.company.name }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Application Status</label>
                <select name="status" required>
                    <option value="Applied" {% if application.status == "Applied" %}selected{% endif %}>Applied</option>
                    <option value="Shortlisted" {% if application.status == "Shortlisted" %}selected{% endif %}>Shortlisted</option>
                    <option value="Rejected" {% if application.status == "Rejected" %}selected{% endif %}>Rejected</option>
                    <option value="Selected" {% if application.status == "Selected" %}selected{% endif %}>Selected</option>
                </select>
            </div>

            <button type="submit" class="btn">Update Application</button>
        </form>

        <a href="/placement_app/applicationd/" class="back-link">← Back to Applications</a>
    </div>
</div>

{% endblock %}
