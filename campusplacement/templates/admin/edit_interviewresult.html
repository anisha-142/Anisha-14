{% extends 'admin/base.html' %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
    :root {
        --primary: #4F46E5;
        --bg: #f8fafc;
    }

    .page-wrapper {
        font-family: 'Outfit', sans-serif;
        background: var(--bg);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    .form-card {
        background: #fff;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        width: 100%;
        max-width: 500px;
    }

    h1 {
        text-align: center;
        color: #1e1b4b;
        margin-bottom: 25px;
        font-size: 1.7rem;
    }

    .form-group {
        margin-bottom: 18px;
    }

    label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
        color: #4b5563;
    }

    select, textarea {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #e2e8f0;
        font-size: 0.95rem;
        font-family: 'Outfit', sans-serif;
        transition: 0.3s;
    }

    select:focus, textarea:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(79,70,229,0.1);
    }

    textarea {
        resize: vertical;
        min-height: 90px;
    }

    .btn {
        width: 100%;
        padding: 14px;
        background: var(--primary);
        color: #fff;
        border: none;
        border-radius: 10px;
        font-weight: 700;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 10px;
    }

    .btn:hover {
        background: #4338ca;
        transform: translateY(-2px);
    }

    .messages {
        text-align: center;
        margin-bottom: 15px;
    }

    .success { color: #10b981; }
    .error { color: #ef4444; }

    .back-link {
        display: block;
        text-align: center;
        margin-top: 20px;
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
    }

    .back-link:hover {
        text-decoration: underline;
    }
</style>

<div class="page-wrapper">
    <div class="form-card">
        <h1>✏️ Edit Interview Result</h1>

        {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <p class="{{ message.tags }}">{{ message }}</p>
            {% endfor %}
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label>Application</label>
                <select name="application" required>
                    {% for a in applications %}
                        <option value="{{ a.id }}" {% if a.id == result.application.id %}selected{% endif %}>
                            {{ a.student.user.username }} — {{ a.job.title }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Interview Round</label>
                <select name="round" required>
                    {% for r in rounds %}
                        <option value="{{ r.id }}" {% if r.id == result.round.id %}selected{% endif %}>
                            {{ r.name }} ({{ r.job.title }})
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Result</label>
                <select name="result" required>
                    <option value="Cleared" {% if result.result == "Cleared" %}selected{% endif %}>Cleared</option>
                    <option value="Not Cleared" {% if result.result == "Not Cleared" %}selected{% endif %}>Not Cleared</option>
                </select>
            </div>

            <div class="form-group">
                <label>Remarks</label>
                <textarea name="remarks">{{ result.remarks }}</textarea>
            </div>

            <button type="submit" class="btn">Update Result</button>
        </form>

        <a href="/placement_app/resultd/" class="back-link">← Back to Results</a>
    </div>
</div>

{% endblock %}
