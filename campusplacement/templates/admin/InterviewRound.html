<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Interview Round</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4F46E5;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .form-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            text-align: center;
            color: #1e1b4b;
            margin-bottom: 30px;
            font-size: 1.8rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #4b5563;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
            font-size: 1.1rem;
        }

        .btn:hover {
            background: #4338ca;
            transform: translateY(-2px);
        }

        .messages {
            text-align: center;
            margin-bottom: 20px;
        }

        .success {
            color: #10b981;
        }

        .error {
            color: #ef4444;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="form-card">
        <h1><i class="fas fa-calendar-alt"></i> Schedule Interview Round</h1>

        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <p class="{{ message.tags }}">{{ message }}</p>
            {% endfor %}
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Select Job Opening</label>
                <select name="job" required>
                    <option value="">Choose job...</option>
                    {% for job in jobs %}
                    <option value="{{ job.id }}">{{ job.title }} at {{ job.company.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Round Name</label>
                <input type="text" name="name" placeholder="e.g. Technical Round 1" required>
            </div>
            <div class="form-group">
                <label>Round Type</label>
                <select name="round_type" required>
                    <option value="Aptitude">Aptitude</option>
                    <option value="Technical">Technical</option>
                    <option value="HR">HR</option>
                    <option value="Group Discussion">Group Discussion</option>
                </select>
            </div>
            <div class="form-group">
                <label>Scheduled Date & Time</label>
                <input type="datetime-local" name="scheduled_date" required>
            </div>
            <button type="submit" class="btn">Schedule Round</button>
        </form>
        <a href="{% url 'placementhome' %}" class="back-link">← Back to Dashboard</a>
    </div>
</body>

</html>
