{% extends 'admin/base.html' %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
    :root {
        --primary: #4F46E5;
        --bg: #f8fafc;
    }

    .page-wrapper {
        font-family: 'Outfit', sans-serif;
        background: var(--bg);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    .form-card {
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        width: 100%;
        max-width: 550px;
    }

    h1 {
        text-align: center;
        color: #1e1b4b;
        margin-bottom: 30px;
        font-size: 1.8rem;
    }

    .form-group {
        margin-bottom: 18px;
    }

    label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
        color: #4b5563;
    }

    input, textarea, select {
        width: 100%;
        padding: 12px;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        font-size: 0.95rem;
        font-family: 'Outfit', sans-serif;
        transition: 0.3s;
    }

    input:focus, textarea:focus, select:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(79,70,229,0.1);
    }

    textarea {
        resize: vertical;
        min-height: 90px;
    }

    .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
    }

    .section-title {
        font-size: 0.8rem;
        font-weight: 700;
        color: #9ca3af;
        text-transform: uppercase;
        margin: 20px 0 10px;
        letter-spacing: 0.05em;
    }

    .btn {
        width: 100%;
        padding: 14px;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 10px;
        font-weight: 700;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 10px;
        font-size: 1.05rem;
    }

    .btn:hover {
        background: #4338ca;
        transform: translateY(-2px);
    }

    .messages {
        text-align: center;
        margin-bottom: 20px;
    }

    .success { color: #10b981; }
    .error { color: #ef4444; }

    .back-link {
        display: block;
        text-align: center;
        margin-top: 20px;
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
    }

    .back-link:hover {
        text-decoration: underline;
    }
</style>

<div class="page-wrapper">
    <div class="form-card">
        <h1>✏️ Edit Company</h1>

        {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <p class="{{ message.tags }}">{{ message }}</p>
            {% endfor %}
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label>User Account</label>
                <select name="user" required>
                    {% for u in users %}
                        <option value="{{ u.id }}" {% if u.id == company.user.id %}selected{% endif %}>
                            {{ u.username }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Company Name</label>
                <input type="text" name="name" value="{{ company.name }}" required>
            </div>

            <div class="form-group">
                <label>Website</label>
                <input type="url" name="website" value="{{ company.website }}">
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea name="description" required>{{ company.description }}</textarea>
            </div>

            <p class="section-title">HR Details</p>

            <div class="form-group">
                <label>HR Name</label>
                <input type="text" name="hr_name" value="{{ company.hr_name }}" required>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label>HR Email</label>
                    <input type="email" name="hr_email" value="{{ company.hr_email }}" required>
                </div>

                <div class="form-group">
                    <label>HR Phone</label>
                    <input type="text" name="hr_phone" value="{{ company.hr_phone }}" required>
                </div>
            </div>

            <div class="form-group">
                <label>Created By (Officer)</label>
                <select name="created_by">
                    <option value="">-- None --</option>
                    {% for o in officers %}
                        <option value="{{ o.id }}"
                        {% if company.created_by and company.created_by.id == o.id %}selected{% endif %}>
                            {{ o.user.username }} - {{ o.college.name }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit" class="btn">Update Company</button>
        </form>

        <a href="/placement_app/companyd/" class="back-link">← Back to Company List</a>
    </div>
</div>

{% endblock %}
