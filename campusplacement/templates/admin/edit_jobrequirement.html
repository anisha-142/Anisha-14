{% extends 'admin/base.html' %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
    :root {
        --primary: #4F46E5;
        --bg: #f8fafc;
    }

    .page-wrapper {
        font-family: 'Outfit', sans-serif;
        background: var(--bg);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    .form-card {
        background: #fff;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        width: 100%;
        max-width: 550px;
    }

    h1 {
        text-align: center;
        color: #1e1b4b;
        margin-bottom: 25px;
        font-size: 1.7rem;
    }

    .form-group {
        margin-bottom: 18px;
    }

    label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
        color: #4b5563;
    }

    input, textarea, select {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #e2e8f0;
        font-size: 0.95rem;
        font-family: 'Outfit', sans-serif;
        transition: 0.3s;
    }

    input:focus, textarea:focus, select:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(79,70,229,0.1);
    }

    textarea {
        resize: vertical;
        min-height: 90px;
    }

    .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
    }

    .section-title {
        font-size: 0.85rem;
        font-weight: 700;
        color: #9ca3af;
        text-transform: uppercase;
        margin: 20px 0 10px;
    }

    .btn {
        width: 100%;
        padding: 14px;
        background: var(--primary);
        color: #fff;
        border: none;
        border-radius: 10px;
        font-weight: 700;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 10px;
    }

    .btn:hover {
        background: #4338ca;
        transform: translateY(-2px);
    }

    .messages {
        text-align: center;
        margin-bottom: 15px;
    }

    .success { color: #10b981; }
    .error { color: #ef4444; }

    .back-link {
        display: block;
        text-align: center;
        margin-top: 20px;
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
    }

    .back-link:hover {
        text-decoration: underline;
    }
</style>

<div class="page-wrapper">
    <div class="form-card">
        <h1>✏️ Edit Job Requirement</h1>

        {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <p class="{{ message.tags }}">{{ message }}</p>
            {% endfor %}
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label>Company</label>
                <select name="company" required>
                    {% for c in companies %}
                        <option value="{{ c.id }}" {% if c.id == job.company.id %}selected{% endif %}>
                            {{ c.name }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Job Title</label>
                <input type="text" name="title" value="{{ job.title }}" required>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea name="description" required>{{ job.description }}</textarea>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" name="location" value="{{ job.location }}" required>
                </div>
                <div class="form-group">
                    <label>Package</label>
                    <input type="text" name="package" value="{{ job.package }}" required>
                </div>
            </div>

            <div class="form-group">
                <label>Job Type</label>
                <select name="job_type" required>
                    <option value="Full Time" {% if job.job_type == "Full Time" %}selected{% endif %}>Full Time</option>
                    <option value="Internship" {% if job.job_type == "Internship" %}selected{% endif %}>Internship</option>
                    <option value="Contract" {% if job.job_type == "Contract" %}selected{% endif %}>Contract</option>
                </select>
            </div>

            <div class="section-title">Eligibility Criteria</div>

            <div class="grid-2">
                <div class="form-group">
                    <label>Min CGPA</label>
                    <input type="number" step="0.01" name="min_cgpa" value="{{ job.min_cgpa }}" required>
                </div>
                <div class="form-group">
                    <label>Max Backlogs</label>
                    <input type="number" name="max_backlogs" value="{{ job.max_backlogs }}" required>
                </div>
            </div>

            <div class="form-group">
                <label>Eligible Departments</label>
                <input type="text" name="eligible_departments" value="{{ job.eligible_departments }}" required>
            </div>

            <div class="form-group">
                <label>Application Deadline</label>
                <input type="date" name="deadline" value="{{ job.deadline|date:'Y-m-d' }}" required>
            </div>

            <button type="submit" class="btn">Update Job Requirement</button>
        </form>

        <a href="/placement_app/jobd/" class="back-link">← Back to Job List</a>
    </div>
</div>

{% endblock %}
