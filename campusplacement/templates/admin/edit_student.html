{% extends 'admin/base.html' %}

{% block content %}

<style>
    .form-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 40px 20px;
        background: #f8fafc;
        min-height: 100vh;
    }

    .form-card {
        background: #ffffff;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        width: 100%;
        max-width: 600px;
    }

    .form-card h1 {
        text-align: center;
        margin-bottom: 25px;
        color: #1e293b;
        font-weight: 700;
    }

    .form-group {
        margin-bottom: 18px;
    }

    .form-group label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
        color: #475569;
    }

    .form-control {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #e2e8f0;
        font-size: 14px;
        transition: 0.3s;
    }

    .form-control:focus {
        outline: none;
        border-color: #4f46e5;
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
    }

    .section-title {
        margin: 20px 0 10px;
        font-size: 13px;
        font-weight: 700;
        color: #94a3b8;
        text-transform: uppercase;
    }

    .btn-submit {
        width: 100%;
        padding: 14px;
        background: #4f46e5;
        color: white;
        border: none;
        border-radius: 10px;
        font-weight: 700;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 10px;
    }

    .btn-submit:hover {
        background: #4338ca;
        transform: translateY(-2px);
    }

    .messages {
        text-align: center;
        margin-bottom: 15px;
    }

    .messages p {
        font-weight: 500;
    }

    .back-link {
        display: block;
        text-align: center;
        margin-top: 20px;
        color: #4f46e5;
        text-decoration: none;
        font-weight: 600;
    }

    .back-link:hover {
        text-decoration: underline;
    }
</style>

<div class="form-wrapper">
    <div class="form-card">
        <h1>✏️ Edit Student</h1>

        {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <p class="{{ message.tags }}">{{ message }}</p>
            {% endfor %}
        </div>
        {% endif %}

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="form-group">
                <label>User Account</label>
                <select name="user" class="form-control" required>
                    {% for u in users %}
                    <option value="{{ u.id }}" {% if u.id == student.user.id %}selected{% endif %}>
                        {{ u.username }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>College</label>
                <select name="college" class="form-control" required>
                    {% for c in colleges %}
                    <option value="{{ c.id }}" {% if c.id == student.college.id %}selected{% endif %}>
                        {{ c.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Registration Number</label>
                <input type="text" name="registration_number" class="form-control"
                       value="{{ student.registration_number }}" required>
            </div>

            <div class="section-title">Academic Info</div>

            <div class="grid-2">
                <div class="form-group">
                    <label>Department</label>
                    <input type="text" name="department" class="form-control"
                           value="{{ student.department }}" required>
                </div>

                <div class="form-group">
                    <label>Course</label>
                    <input type="text" name="course" class="form-control"
                           value="{{ student.course }}" required>
                </div>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label>Year</label>
                    <input type="number" name="year" class="form-control"
                           value="{{ student.year }}" required>
                </div>

                <div class="form-group">
                    <label>CGPA</label>
                    <input type="number" step="0.01" name="cgpa" class="form-control"
                           value="{{ student.cgpa }}" required>
                </div>
            </div>

            <div class="section-title">Previous Scores</div>

            <div class="grid-2">
                <div class="form-group">
                    <label>10th %</label>
                    <input type="number" step="0.01" name="percentage_10th"
                           class="form-control" value="{{ student.percentage_10th }}" required>
                </div>

                <div class="form-group">
                    <label>12th %</label>
                    <input type="number" step="0.01" name="percentage_12th"
                           class="form-control" value="{{ student.percentage_12th }}" required>
                </div>
            </div>

            <div class="form-group">
                <label>Backlogs</label>
                <input type="number" name="backlogs" class="form-control"
                       value="{{ student.backlogs }}" required>
            </div>

            <div class="form-group">
                <label>Resume (leave blank to keep existing)</label>
                <input type="file" name="resume" class="form-control">
            </div>

            <button type="submit" class="btn-submit">Update Student</button>
        </form>

        <a href="/placement_app/studentd/" class="back-link">← Back to Student List</a>
    </div>
</div>

{% endblock %}
